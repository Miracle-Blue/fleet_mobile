name: mobile
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.10.9

workspace:
  - packages/ui

dependencies:
  flutter:
    sdk: flutter

  # workspace
  ui:
    path: packages/ui

  cupertino_icons: ^1.0.8
  logbook: ^0.5.1
  firebase_core: ^4.7.0
  platform_info: ^5.0.0
  device_info_plus: ^13.1.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  firebase_messaging: ^16.2.0
  firebase_remote_config: ^6.4.0
  collection: ^1.19.1
