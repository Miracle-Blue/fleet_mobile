name: fleet_mobile
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.9

workspace:
  - packages/ui

dependencies:
  # framework
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # workspace
  ui:
    path: packages/ui

  # firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_remote_config: ^6.4.0

  # plugins
  connectivity_plus: ^6.1.0
  device_info_plus: ^13.1.0
  flutter_inappwebview: ^6.2.0-beta.3
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  platform_info: ^5.0.0
  url_launcher: ^6.3.2

  # utilities
  collection: ^1.19.1
  control: ^0.2.0
  http: ^1.6.0
  intl: ^0.20.2
  keyboard_dismisser: ^3.0.0
  logbook: ^0.5.1
  meta: ^1.17.0
  throttling: ^2.0.1

dev_dependencies:
  # framework
  flutter_test:
    sdk: flutter

  # lints
  flutter_lints: ^6.0.0

  # code generation
  build_runner: ^2.14.1
  pubspec_generator: ^5.0.1
  # dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_native_splash:create --path=flutter_native_splash.yaml
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
